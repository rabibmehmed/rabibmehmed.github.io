<!DOCTYPE html>
<html>
<head>
    <title>My Business Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            padding: 60px 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            opacity: 0.9;
        }

        .card {
            background: white;
            color: black;
            width: 300px;
            margin: 30px auto;
            padding: 20px;
            border-radius: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 20px;
            margin-top: 15px;
            background: #ff6600;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #ff3300;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Welcome to My Website</h1>
    <p>Learn Dropshipping & Online Business with me</p>

    <div class="card">
        <h2>🔥 My Course</h2>
        <p>Start earning from online business using mobile only</p>
        <a class="btn" href="#">Join Now</a>
    </div>

</div>

</body>
</html>
